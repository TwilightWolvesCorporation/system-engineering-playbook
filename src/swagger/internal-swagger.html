<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Dockies Internal API (AsyncAPI)</title>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #root { min-height: 100vh; }
        .error { padding: 2rem; color: #d32f2f; background: #ffebee; border: 1px solid #f5c6cb; margin: 1rem; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@asyncapi/react-component@1.3.0/browser/index.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@asyncapi/react-component@1.3.0/styles/default.min.css">
</head>
<body>
<div id="root"></div>
<script>
    (function() {
        const specUrl = './internal-swagger.yaml';
        fetch(specUrl)
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                return response.text();
            })
            .then(yamlText => {
                const jsyaml = window.jsyaml || (() => { throw new Error('jsyaml не загружен'); });
                const AsyncApiComponent = window.AsyncApiComponent;
                if (!AsyncApiComponent) throw new Error('AsyncApiComponent не загружен');
                const root = document.getElementById('root');
                const element = React.createElement(AsyncApiComponent, {
                    schema: yamlText,
                    config: { show: { sidebar: true } }
                });
                ReactDOM.render(element, root);
            })
            .catch(error => {
                document.getElementById('root').innerHTML = `
                        <div class="error">
                            <h3>Ошибка загрузки спецификации AsyncAPI</h3>
                            <p><strong>${error.message}</strong></p>
                            <p>Проверьте, что файл <code>${specUrl}</code> существует и доступен.</p>
                            <p>Относительный путь должен быть правильным. Текущий URL: ${window.location.href}</p>
                        </div>
                    `;
            });
    })();
</script>
</body>
</html>
